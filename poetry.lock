]

[package.dependencies]
argcomplete = ">=1.8.1"
PyYAML = ">=5.3.1"
tomlkit = ">=0.11.6"
xmltodict = ">=0.11.0"

[package.extras]
tests = ["build", "coverage", "mypy", "ruff", "wheel"]

[[package]]
name = "zipp"
version = "3.23.0"
