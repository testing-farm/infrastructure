---

extends:
  - base-tmt_pipeline
  - base-tmt_checks

marks:
  - public
  - pipeline

variables:
  REQUEST_ID: c73929f4-7523-496d-9db5-3d2b1eb6b5af
  COMPOSE: Fedora-Rawhide
  ARCH: x86_64
  RESULT: PASSED
  GIT_CLONE_URL: https://gitlab.com/testing-farm/tests
  GIT_REF: main
  PLAN: /testing-farm/sanity

checks:
  literal-patterns[work-sanity*/log.txt]:
    - |
      environment:
          TESTING_FARM_REQUEST_ID: {{ REQUEST_ID }}
          TESTING_FARM_TEST_TYPE: fmf
          TESTING_FARM_GIT_URL: {{ GIT_CLONE_URL }}
          TESTING_FARM_GIT_REF: {{ GIT_REF }}
          TMT_VERSION: {{ '\d+' }}.{{ '\d+' }}.{{ '\d+' }}
          TMT_TREE: /var/ARTIFACTS/work-sanity{{ '[a-zA-Z0-9_-]+' }}{{ PLAN }}/tree
          TMT_PLAN_DATA: /var/ARTIFACTS/work-sanity{{ '[a-zA-Z0-9_-]+' }}{{ PLAN }}/data
          TMT_PLAN_ENVIRONMENT_FILE: /var/ARTIFACTS/work-sanity{{ '[a-zA-Z0-9_-]+' }}{{ PLAN }}/data/variables.env
          TMT_PLAN_SOURCE_SCRIPT: /var/ARTIFACTS/work-sanity{{ '[a-zA-Z0-9_-]+' }}{{ PLAN }}/data/plan-source-script.sh
