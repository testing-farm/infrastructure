---

extends:
  - base-tmt_checks

variables:
  COMPOSE: CentOS-Stream-8
  ARCH: x86_64
  RESULT: PASSED
  GIT_CLONE_URL: https://gitlab.com/testing-farm/tests
  GIT_REF: main
  PLAN: /testing-farm/sanity

testing-farm: |
    testing-farm request --sanity --compose CentOS-Stream-8

checks:
  literal-strings:
    - "[test-schedule-report] Result of testing: PASSED"
  literal-strings[results.xml]:
    - '<testsuite name="/testing-farm/sanity" result="passed" tests="1" stage="complete">'
  artifacts:
    - results.xml
