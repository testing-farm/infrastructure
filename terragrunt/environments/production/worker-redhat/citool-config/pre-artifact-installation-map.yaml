---
- rule: "True"
  playbooks:
    - /CONFIG/guest-setup/pre-artifact-installation/entrypoint.yaml
  extra_vars:
    TESTING_FARM_REQUEST_ID: "{{ TESTING_FARM_REQUEST_ID }}"

- rule: >
    GUEST.environment.settings is not None
    and "pipeline" in GUEST.environment.settings
    and GUEST.environment.settings["pipeline"] is not None
    and "skip_guest_setup" in GUEST.environment.settings["pipeline"]
    and GUEST.environment.settings["pipeline"]["skip_guest_setup"] == True
  playbooks: []
