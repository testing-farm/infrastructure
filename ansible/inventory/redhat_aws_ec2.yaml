---
#
# For documentation see:
# https://docs.ansible.com/ansible/latest/collections/amazon/aws/aws_ec2_inventory.html
#

plugin: amazon.aws.aws_ec2

cache: true
cache_plugin: ansible.builtin.jsonfile
cache_connection: .direnv/aws-cache

profile: redhat_us_east_1_ansible_inventory

# IMPORTANT: MUST be explicitely set or the inventory plugin queries all regions!
regions:
  - us-east-1

include_filters:
  - tag:ServiceOwner:
      - "TFT"

hostnames:
  - "tag:Name"

compose:
  ansible_host: private_ip_address

groups:
  testing_farm_redhat_workers:
    tags.ServiceOwner == "TFT"
    and tags.ServiceComponent == "Worker"
    and tags.ServicePhase == "Prod"
  testing_farm_redhat_servers:
    tags.ServiceOwner == "TFT"
    and tags.ServiceComponent == "Server"
    and tags.ServicePhase == "Prod"
