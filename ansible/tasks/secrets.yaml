---
- name: Create podman secrets for citool config
  become: true
  no_log: true
  shell: |
    podman secret rm "{{ item.name }}" 2>/dev/null || true
    {% if item.file is defined %}
    podman secret create "{{ item.name }}" "{{ item.file }}"
    {% else %}
    cat <<'EOF' | podman secret create "{{ item.name }}" -
    {{ item.content }}
    EOF
    {% endif %}
  loop: "{{ citool_config_podman_secrets | default([]) }}"
  loop_control:
    label: "{{ item.name }}"
  when: citool_config_podman_secrets is defined
